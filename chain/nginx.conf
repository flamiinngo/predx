server {
    listen 8080;

    # CometBFT / Tendermint RPC — used by IWK apis.rpc and CosmJS StargateClient
    # Accessible at /rpc/* — strips prefix and forwards to port 26657
    location /rpc/ {
        proxy_pass         http://127.0.0.1:26657/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 300s;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Cosmos REST API (gRPC-gateway) — port 1317
    # /rest/* strips prefix and forwards to 1317 root
    location /rest/ {
        proxy_pass         http://127.0.0.1:1317/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # EVM JSON-RPC — port 8545 (everything else)
    location / {
        proxy_pass         http://127.0.0.1:8545;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }
}
