server {
    listen 8080;

    # Cosmos REST API — accessed via /cosmos/ prefix
    # nginx strips the /cosmos prefix before forwarding to port 1317
    # e.g. GET /cosmos/cosmos/bank/v1beta1/... → GET /cosmos/bank/v1beta1/... on :1317
    location /cosmos/ {
        proxy_pass         http://127.0.0.1:1317/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;

        # CORS — required for browser wallet SDK (InterwovenKit) cross-origin calls
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # EVM JSON-RPC — everything else goes to port 8545
    location / {
        proxy_pass         http://127.0.0.1:8545;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
