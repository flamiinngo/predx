server {
    # Railway routes external traffic to port 8545 (original EVM port).
    # nginx owns 8545; EVM JSON-RPC runs internally on 18545.
    listen 8545;

    # CometBFT RPC — IWK apis.rpc, CosmJS StargateClient
    location /rpc/ {
        proxy_pass         http://127.0.0.1:26657/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 300s;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Cosmos REST API — IWK authz/feegrant broadcast, account queries
    location /rest/ {
        proxy_pass         http://127.0.0.1:1317/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # EVM JSON-RPC — wagmi, ethers.js, all contract calls (internal port 18545)
    location / {
        proxy_pass         http://127.0.0.1:18545;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
        # EVM server already sets CORS headers — hide them so nginx adds only one copy
        proxy_hide_header  Access-Control-Allow-Origin;
        proxy_hide_header  Access-Control-Allow-Methods;
        proxy_hide_header  Access-Control-Allow-Headers;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }
}
